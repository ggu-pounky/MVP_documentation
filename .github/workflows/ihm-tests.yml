name: IHM Tests

on:
  # Déclencher après un push sur main ou preview
  push:
    branches: [main, preview]
  
  # Déclencher manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  verify-setup:
    name: Vérifier la configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run verification script
        run: node tests/verify-setup.js

  playwright-tests:
    name: Tests IHM avec Playwright
    runs-on: ubuntu-latest
    needs: verify-setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Start Next.js server
        run: npm run start &
        env:
          NODE_ENV: test
      
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000
        timeout-minutes: 2
      
      - name: Run Playwright tests
        run: npx playwright test tests/playwright/
        env:
          BASE_URL: http://localhost:3000
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Alternative: Tests avec Puppeteer
  puppeteer-tests:
    name: Tests IHM avec Puppeteer
    runs-on: ubuntu-latest
    needs: verify-setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Puppeteer
        run: npm install puppeteer
      
      - name: Run Puppeteer tests
        run: node tests/ihm-test.js
        env:
          VERCEL_URL: http://localhost:3000
          HEADLESS: true
