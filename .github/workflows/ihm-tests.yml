name: IHM Tests & Deploy

on:
  # Déclencher après un push sur main ou preview
  push:
    branches: [main, preview]
  
  # Déclencher manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  verify-setup:
    name: Vérifier la configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run verification script
        run: node tests/verify-setup.js

  build-test:
    name: Tester le build Next.js
    runs-on: ubuntu-latest
    needs: verify-setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Next.js build
        run: npm run build
      
      - name: Check build succeeded
        run: |
          echo "✅ Next.js build successful"
          ls -la .next/ 2>/dev/null | head -5 || echo "Build output exists"

  deploy:
    name: Déployer sur Vercel
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Install Vercel CLI
        run: npm install -g vercel
      
      - name: Deploy to Vercel
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "🚀 Déploiement en production (main)"
            vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --confirm
          else
            echo "🚀 Déploiement en preview"
            vercel --token=${{ secrets.VERCEL_TOKEN }} --confirm
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
