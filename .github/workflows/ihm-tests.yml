name: IHM Tests

on:
  # Déclencher après un push sur main
  push:
    branches: [main, preview]
  
  # Déclencher manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  verify-setup:
    name: Vérifier la configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run verification script
        run: node tests/verify-setup.js

  # Test avec Playwright (plus complet)
  playwright-tests:
    name: Tests IHM avec Playwright
    runs-on: ubuntu-latest
    needs: verify-setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000

  # Test avec Puppeteer (alternative)
  puppeteer-tests:
    name: Tests IHM avec Puppeteer
    runs-on: ubuntu-latest
    needs: verify-setup
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Puppeteer
        run: npm install puppeteer
      
      - name: Run Puppeteer tests
        run: node tests/ihm-test.js
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          HEADLESS: true
